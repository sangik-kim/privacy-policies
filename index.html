<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policies — PapaCoder</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --border: #334155;
        --accent: #60a5fa;
        --accent-hover: #93c5fd;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }
    header { margin-bottom: 2rem; }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.75rem;
      font-weight: 700;
    }
    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }
    .subtitle a {
      color: var(--accent);
      text-decoration: none;
    }
    .subtitle a:hover { text-decoration: underline; }
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    li {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 0.75rem;
    }
    li a {
      display: block;
      padding: 1rem 1.25rem;
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }
    li a:hover { color: var(--accent); }
    li .desc {
      display: block;
      margin-top: 0.25rem;
      font-weight: 400;
      font-size: 0.875rem;
      color: var(--muted);
    }
    footer {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.875rem;
      color: var(--muted);
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Privacy Policies</h1>
      <p class="subtitle">
        Mobile applications by
        <a href="https://autumn-paper-e0fa.fatessky.workers.dev/" rel="noopener noreferrer">PapaCoder</a>
      </p>
    </header>

    <main>
      <ul>
        <li>
          <a href="tinywins.html">
            TinyWins
            <span class="desc">Local-first sticker chart app for parents and children</span>
          </a>
        </li>
      </ul>
    </main>

    <footer>
      <p>
        Published by <a href="https://autumn-paper-e0fa.fatessky.workers.dev/" rel="noopener noreferrer">PapaCoder</a>.
        Policies are hosted on
        <a href="https://pages.github.com/" rel="noopener noreferrer">GitHub Pages</a>.
      </p>
    </footer>
  </div>
</body>
</html>
